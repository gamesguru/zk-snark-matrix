---
name: Rust ZK-Matrix CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup SP1 Toolchain
        run: |
          curl -L https://sp1up.succinct.xyz | bash
          ~/.sp1/bin/sp1up
          echo "$HOME/.sp1/bin" >> $GITHUB_PATH

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Print System & Toolchain Diagnostics
        run: make cpu-info

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build

      - name: Run Clippy (Linter)
        run: cargo clippy -- -D warnings

      - name: Run ZK MockProver Tests
        run: cargo test -p zk-matrix-join-host

      - name: Execute Full SP1 Host Prover
        id: sp1_prove
        continue-on-error: true
        run: make prove

      - name: Execute Full SP1 Host Prover (Verbose Backtrace Fallback)
        if: steps.sp1_prove.outcome == 'failure'
        run: |
          echo "::error::Initial prover run failed! Rerunning with full backtraces enabled..."
          RUST_BACKTRACE=full make prove
          exit 1

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM Web Client
        run: make wasm
